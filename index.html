<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ギター練習記録</title>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
  <link rel="manifest" href="/guitarlog/manifest.webmanifest">
  <meta name="theme-color" content="#ee8727">
  <meta name="mobile-web-app-capable" content="yes">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      background: #f2f4f7;
      color: #1a1a2e;
      min-height: 100vh;
    }

    /* ヘッダー */
    header {
      background: #ee8727;
      color: white;
      padding: 20px 20px 0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    header h1 {
      font-size: 20px;
      font-weight: 700;
      padding-bottom: 14px;
    }

    /* タブ */
    .tabs { display: flex; gap: 4px; }
    .tab-btn {
      flex: 1;
      padding: 10px 4px;
      border: none;
      background: transparent;
      color: rgba(255,255,255,0.7);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: all 0.2s;
    }
    .tab-btn.active { color: white; border-bottom-color: white; }

    /* タブコンテンツ */
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* メインコンテンツ */
    main {
      padding: 16px;
      max-width: 480px;
      margin: 0 auto;
    }

    /* カード */
    .card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    /* セクションラベル */
    .label {
      font-size: 12px;
      font-weight: 700;
      color: #888;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
    }

    /* カスタムドロップダウン */
    .custom-select {
      position: relative;
      width: 100%;
    }
    .custom-select-trigger {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      font-size: 15px;
      border: 1.5px solid #dde1e7;
      border-radius: 8px;
      background: white;
      color: #1a1a2e;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
    }
    .custom-select-trigger.disabled {
      background-color: #f5f5f5;
      color: #aaa;
      cursor: not-allowed;
      pointer-events: none;
    }
    .custom-select-trigger .placeholder {
      color: #aaa;
    }
    .select-arrow {
      color: #888;
      font-size: 11px;
      flex-shrink: 0;
      margin-left: 8px;
      transition: transform 0.2s;
    }
    .custom-select-trigger.open .select-arrow {
      transform: rotate(180deg);
    }
    .custom-select-dropdown {
      display: none;
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      background: white;
      border: 1.5px solid #dde1e7;
      border-radius: 8px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
      z-index: 50;
      max-height: 55vh;
      overflow-y: auto;
    }
    .custom-select-dropdown.open {
      display: block;
    }
    .custom-option {
      padding: 12px 16px;
      font-size: 14px;
      cursor: pointer;
      border-bottom: 1px solid #f0f0f0;
      line-height: 1.3;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }
    .custom-option:last-child { border-bottom: none; }
    .custom-option:hover { background: #f5f5f5; }
    .custom-option:active { background: #ebebeb; }
    .custom-option-name {
      flex: 1;
    }
    .custom-option-count {
      font-size: 12px;
      color: #aaa;
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* ボタン */
    .btn {
      width: 100%;
      min-height: 56px;
      border: none;
      border-radius: 10px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.5px;
    }
    .btn:active { transform: scale(0.97); }

    .btn-start {
      background: #ee8727;
      color: white;
    }

    .btn-end {
      background: #1593c9;
      color: white;
    }
    .btn-end:disabled {
      background: #90caf9;
      cursor: not-allowed;
      transform: none;
    }

    /* 練習中エリア */
    #practicing-area {
      display: none;
    }

    .song-name {
      font-size: 17px;
      font-weight: 700;
      color: #ec8600;
      margin-bottom: 8px;
    }

    .start-time-label {
      font-size: 13px;
      color: #888;
      margin-bottom: 16px;
    }

    .timer-display {
      text-align: center;
      padding: 16px 0;
    }
    .timer-label {
      font-size: 13px;
      color: #888;
      margin-bottom: 6px;
    }
    .timer-value {
      font-size: 48px;
      font-weight: 300;
      color: #1a1a2e;
      letter-spacing: 2px;
      font-variant-numeric: tabular-nums;
    }

    /* ステータス表示 */
    #status {
      display: none;
      border-radius: 10px;
      padding: 16px;
      font-size: 15px;
      font-weight: 600;
      text-align: center;
      margin-bottom: 12px;
    }
    #status.success {
      background: #e8f5e9;
      color: #2e7d32;
      border: 1.5px solid #a5d6a7;
    }
    #status.error {
      background: #ffebee;
      color: #c62828;
      border: 1.5px solid #ef9a9a;
    }
    #status.sending {
      background: #e3f2fd;
      color: #1565c0;
      border: 1.5px solid #90caf9;
    }

    /* 曲管理タブ */
    .add-song-fields {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
    }
    .add-song-fields #new-song-input {
      grid-column: 1 / 2;
    }
    .add-song-fields #new-artist-input {
      grid-column: 1 / 2;
    }
    .add-song-fields .btn-add {
      grid-column: 2 / 3;
      grid-row: 2;
      padding-top: 9px;
      padding-bottom: 9px;
    }
    .add-song-fields input {
      padding: 9px 14px;
      font-size: 16px;
      border: 1.5px solid #dde1e7;
      border-radius: 8px;
      color: #1a1a2e;
    }
    .add-song-fields input:focus {
      outline: none;
      border-color: #ee8727;
    }
    .btn-add {
      padding: 12px 18px;
      background: #ee8727;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }
    .btn-add:active { transform: scale(0.97); }

    /* 曲リスト */
    .song-list {
      margin-top: 4px;
    }
    .song-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 0;
      border-bottom: 1px solid #f0f0f0;
      font-size: 15px;
    }
    .song-item:last-child { border-bottom: none; }
    .drag-handle {
      color: #ccc;
      font-size: 16px;
      padding-right: 12px;
      cursor: grab;
      flex-shrink: 0;
    }
    .song-name-text {
      flex: 1;
    }
    .song-count {
      font-size: 12px;
      color: #bbb;
      margin: 0 8px;
      white-space: nowrap;
    }
    .btn-delete {
      background: none;
      border: none;
      color: #bbb;
      font-size: 18px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      transition: color 0.15s;
      flex-shrink: 0;
    }
    .btn-delete:active { color: #ae3333; }

    .empty-message {
      color: #aaa;
      font-size: 14px;
      text-align: center;
      padding: 20px 0;
    }

    /* 確認モーダル */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .modal-overlay.active {
      display: flex;
    }
    .modal {
      background: white;
      border-radius: 14px;
      padding: 24px;
      width: 100%;
      max-width: 320px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }
    .modal-message {
      font-size: 15px;
      color: #1a1a2e;
      margin-bottom: 20px;
      line-height: 1.5;
    }
    .modal-buttons {
      display: flex;
      gap: 8px;
    }
    .modal-btn-cancel {
      flex: 1;
      padding: 12px;
      background: #f2f4f7;
      color: #555;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    .modal-btn-delete {
      flex: 1;
      padding: 12px;
      background: #ae3333;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    .modal-btn-save {
      flex: 1;
      padding: 12px;
      background: #1593c9;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    .memo-input {
      width: 100%;
      box-sizing: border-box;
      padding: 10px 12px;
      font-size: 14px;
      border: 1px solid #dde1ea;
      border-radius: 8px;
      margin-bottom: 16px;
      color: #1a1a2e;
      outline: none;
    }
    .memo-input:focus {
      border-color: #1593c9;
    }

    /* 練習キャンセルボタン */
    .btn-cancel-practice {
      display: block;
      width: 100%;
      background: none;
      border: none;
      color: #bbb;
      font-size: 14px;
      cursor: pointer;
      padding: 12px;
      text-align: center;
      margin-top: 4px;
    }
    .btn-cancel-practice:active { color: #888; }
  </style>
</head>
<body>

<header>
  <h1>🎸 ギター練習記録</h1>
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('practice')">練習</button>
    <button class="tab-btn" onclick="switchTab('songs')">曲管理</button>
  </div>
</header>

<main>

  <!-- 練習タブ -->
  <div class="tab-content active" id="tab-practice">

    <!-- ステータス表示 -->
    <div id="status"></div>

    <!-- 曲選択カード -->
    <div class="card">
      <div class="label">SONG</div>
      <div class="custom-select" id="song-select-wrapper">
        <div class="custom-select-trigger" id="song-select-trigger" onclick="toggleSongSelect()">
          <span id="song-select-label" class="placeholder">曲を選択してください</span>
          <span class="select-arrow">▼</span>
        </div>
        <div class="custom-select-dropdown" id="song-select-dropdown"></div>
      </div>
    </div>

    <!-- 開始ボタンカード -->
    <div class="card" id="start-card">
      <button class="btn btn-start" id="btn-start" onclick="startPractice()">開始</button>
    </div>

    <!-- 練習中カード -->
    <div class="card" id="practicing-area">
      <div class="song-name" id="practicing-song"></div>
      <div class="start-time-label" id="start-time-label"></div>
      <div class="timer-display">
        <div class="timer-label">経過時間</div>
        <div class="timer-value" id="timer">00:00</div>
      </div>
      <button class="btn btn-end" id="btn-end" onclick="endPractice()">終了・保存</button>
      <button class="btn-cancel-practice" onclick="cancelPractice()">練習をキャンセル</button>
    </div>

  </div>

  <!-- 曲管理タブ -->
  <div class="tab-content" id="tab-songs">

    <div class="card">
      <div class="label">曲を追加</div>
      <div class="add-song-fields">
        <input type="text" id="new-song-input" placeholder="曲名">
        <input type="text" id="new-artist-input" placeholder="アーティスト名">
        <button class="btn-add" onclick="addSong()">追加</button>
      </div>
    </div>

    <div class="card">
      <div class="label">曲一覧</div>
      <div class="song-list" id="song-list"></div>
    </div>

  </div>

</main>

<script>
  // ============================================================
  // 【設定】GASをデプロイしたらここのURLを書き換える
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbwfp13uUByupUPLGOWm75hXHT-EcCrZ362936imi06wHXvk8xHE0s4BPBGWK_Gprj49/exec';
  // ============================================================

  let startTime = null;
  let timerInterval = null;
  let pendingDeleteSong = null;
  let songCounts = {};
  let songLastDates = {};
  let selectedSong = null;

  function calcDaysAgo(dateStr) {
    if (!dateStr) return null;
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    const last = new Date(dateStr);
    last.setHours(0, 0, 0, 0);
    const diff = Math.round((today - last) / (1000 * 60 * 60 * 24));
    if (diff === 0) return '今日';
    if (diff === 1) return '昨日';
    return diff + '日前';
  }

  // ========== 曲管理 ==========

  function renderSongSelect(songs) {
    const dropdown = document.getElementById('song-select-dropdown');
    dropdown.innerHTML = '';
    songs.forEach(song => {
      const count = songCounts[song.name] !== undefined ? songCounts[song.name] : 0;
      const daysAgo = calcDaysAgo(songLastDates[song.name] || null);
      const countText = daysAgo ? daysAgo + '・' + count + '回' : count + '回';
      const item = document.createElement('div');
      item.className = 'custom-option';
      item.innerHTML = `<span class="custom-option-name">${song.name} / ${song.artist}</span><span class="custom-option-count">${countText}</span>`;
      item.onclick = () => selectSongOption(song.name, song.artist);
      dropdown.appendChild(item);
    });
  }

  function toggleSongSelect() {
    const dropdown = document.getElementById('song-select-dropdown');
    const trigger = document.getElementById('song-select-trigger');
    if (dropdown.classList.contains('open')) {
      dropdown.classList.remove('open');
      trigger.classList.remove('open');
    } else {
      dropdown.classList.add('open');
      trigger.classList.add('open');
    }
  }

  function closeSongSelect() {
    document.getElementById('song-select-dropdown').classList.remove('open');
    document.getElementById('song-select-trigger').classList.remove('open');
  }

  function selectSongOption(name, artist) {
    selectedSong = { name, artist };
    const label = document.getElementById('song-select-label');
    label.textContent = name + ' / ' + artist;
    label.classList.remove('placeholder');
    closeSongSelect();
  }

  function renderSongList(songs) {
    const list = document.getElementById('song-list');
    if (songs.length === 0) {
      list.innerHTML = '<div class="empty-message">曲が登録されていません</div>';
      return;
    }
    list.innerHTML = songs.map(song => {
      const count = songCounts[song.name] !== undefined ? songCounts[song.name] : 0;
      const safeName = song.name.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
      return `<div class="song-item" data-name="${song.name.replace(/"/g, '&quot;')}" data-artist="${song.artist.replace(/"/g, '&quot;')}">
        <span class="drag-handle">☰</span>
        <span class="song-name-text">${song.name} / ${song.artist}</span>
        <span class="song-count">${count}回</span>
        <button class="btn-delete" onclick="deleteSong('${safeName}')" title="削除">✕</button>
      </div>`;
    }).join('');
    initSortable();
  }

  function loadSongs() {
    document.getElementById('song-list').innerHTML =
      '<div class="empty-message">読み込み中...</div>';

    return new Promise(function(resolve) {
      const callbackName = 'gasCallback_' + Date.now();
      const script = document.createElement('script');
      let done = false;

      const timeout = setTimeout(function() {
        if (done) return;
        done = true;
        delete window[callbackName];
        if (script.parentNode) document.head.removeChild(script);
        document.getElementById('song-list').innerHTML =
          '<div class="empty-message">曲リストの取得がタイムアウトしました</div>';
        resolve();
      }, 10000);

      window[callbackName] = function(data) {
        if (done) return;
        done = true;
        clearTimeout(timeout);
        delete window[callbackName];
        if (script.parentNode) document.head.removeChild(script);
        if (data.status === 'ok') {
          songCounts = data.counts || {};
          songLastDates = data.lastDates || {};
          renderSongSelect(data.songs);
          renderSongList(data.songs);
        }
        resolve();
      };

      script.onerror = function() {
        if (done) return;
        done = true;
        clearTimeout(timeout);
        delete window[callbackName];
        if (script.parentNode) document.head.removeChild(script);
        document.getElementById('song-list').innerHTML =
          '<div class="empty-message">曲リストの取得に失敗しました</div>';
        resolve();
      };

      script.src = GAS_URL + '?callback=' + callbackName;
      document.head.appendChild(script);
    });
  }

  function addSong() {
    const nameInput = document.getElementById('new-song-input');
    const artistInput = document.getElementById('new-artist-input');
    const name = nameInput.value.trim();
    const artist = artistInput.value.trim();
    if (!name || !artist) return;

    // プルダウンに同じ曲がすでにあれば追加しない
    const dropdown = document.getElementById('song-select-dropdown');
    if (Array.from(dropdown.querySelectorAll('.custom-option-name')).some(el => el.textContent === name + ' / ' + artist)) return;

    // プルダウンに即座に追加
    const item = document.createElement('div');
    item.className = 'custom-option';
    item.innerHTML = `<span class="custom-option-name">${name} / ${artist}</span><span class="custom-option-count">0回</span>`;
    item.onclick = () => selectSongOption(name, artist);
    dropdown.appendChild(item);

    const list = document.getElementById('song-list');
    const emptyMsg = list.querySelector('.empty-message');
    if (emptyMsg) emptyMsg.remove();
    songCounts[name] = 0;
    const songItem = document.createElement('div');
    songItem.className = 'song-item';
    songItem.dataset.name = name;
    songItem.dataset.artist = artist;
    songItem.innerHTML = `<span class="drag-handle">☰</span><span class="song-name-text">${name} / ${artist}</span><span class="song-count">0回</span><button class="btn-delete" onclick="deleteSong('${name.replace(/\\/g, '\\\\').replace(/'/g, "\\'")}')" title="削除">✕</button>`;
    list.appendChild(songItem);

    nameInput.value = '';
    artistInput.value = '';

    // GASへはバックグラウンドで送信
    fetch(GAS_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'addSong', song: name, artist: artist })
    }).catch(() => {});
  }

  function initSortable() {
    const list = document.getElementById('song-list');
    if (window.Sortable) {
      Sortable.create(list, {
        animation: 150,
        handle: '.drag-handle',
        onEnd: function() {
          const songs = Array.from(list.querySelectorAll('.song-item'))
            .map(el => ({ name: el.dataset.name, artist: el.dataset.artist }));
          renderSongSelect(songs);
          fetch(GAS_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'reorderSongs', songs: songs })
          }).catch(() => {});
        }
      });
    }
  }

  function deleteSong(song) {
    pendingDeleteSong = song;
    document.getElementById('modal-message').textContent = `"${song}" を削除しますか？`;
    document.getElementById('modal-overlay').classList.add('active');
  }

  async function confirmModal() {
    if (!pendingDeleteSong) return;
    const song = pendingDeleteSong;
    closeModal();

    // UIから即座に削除
    const listEl = document.getElementById('song-list');
    listEl.querySelectorAll('.song-item').forEach(item => {
      if (item.dataset.name === song) item.remove();
    });
    document.querySelectorAll('#song-select-dropdown .custom-option').forEach(opt => {
      if (opt.querySelector('.custom-option-name').textContent.startsWith(song + ' / ')) opt.remove();
    });
    if (listEl.querySelectorAll('.song-item').length === 0) {
      listEl.innerHTML = '<div class="empty-message">曲が登録されていません</div>';
    }

    // GASへはバックグラウンドで送信
    fetch(GAS_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'deleteSong', song: song })
    }).catch(() => {});
  }

  function closeModal() {
    pendingDeleteSong = null;
    document.getElementById('modal-overlay').classList.remove('active');
  }

  function cancelPractice() {
    document.getElementById('cancel-modal-overlay').classList.add('active');
  }

  function closeCancelModal() {
    document.getElementById('cancel-modal-overlay').classList.remove('active');
  }

  function confirmCancel() {
    closeCancelModal();
    clearInterval(timerInterval);
    timerInterval = null;
    resetUI();
  }

  // ========== タブ切り替え ==========

  function switchTab(tab) {
    document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
    event.target.classList.add('active');
  }

  // ========== 練習 ==========

  function startPractice() {
    if (!selectedSong) {
      showStatus('曲を選択してください', 'error');
      return;
    }

    startTime = new Date();
    hideStatus();

    document.getElementById('song-select-trigger').classList.add('disabled');
    document.getElementById('btn-start').disabled = true;
    document.getElementById('start-card').style.display = 'none';

    document.getElementById('practicing-song').textContent = selectedSong.name + ' / ' + selectedSong.artist;
    document.getElementById('start-time-label').textContent = '開始: ' + formatTime(startTime);
    document.getElementById('practicing-area').style.display = 'block';
    document.getElementById('btn-end').disabled = false;

    timerInterval = setInterval(updateTimer, 1000);
  }

  let pendingSaveEndTime = null;

  function formatDuration(seconds) {
    const m = Math.floor(seconds / 60);
    const s = seconds % 60;
    return m + '分' + s + '秒';
  }

  function endPractice() {
    pendingSaveEndTime = new Date();
    const duration = Math.round((pendingSaveEndTime - startTime) / 1000);
    document.getElementById('save-modal-song').textContent = selectedSong.name + ' / ' + selectedSong.artist;
    document.getElementById('save-modal-duration').textContent = formatDuration(duration);
    document.getElementById('save-modal-overlay').classList.add('active');
  }

  function closeSaveModal() {
    pendingSaveEndTime = null;
    document.getElementById('save-modal-overlay').classList.remove('active');
  }

  function confirmSave() {
    const endTime = pendingSaveEndTime;
    pendingSaveEndTime = null;
    document.getElementById('save-modal-overlay').classList.remove('active');

    const song = selectedSong.name;
    const artist = selectedSong.artist;

    clearInterval(timerInterval);
    timerInterval = null;

    document.getElementById('btn-end').disabled = true;

    const duration = Math.round((endTime - startTime) / 1000);

    const memo = document.getElementById('memo-input').value;
    document.getElementById('memo-input').value = '';

    const payload = {
      date:      formatDate(startTime),
      song:      song,
      artist:    artist,
      startTime: formatTime(startTime),
      endTime:   formatTime(endTime),
      duration:  duration,
      memo:      memo
    };

    showStatus('送信中...', 'sending');

    fetch(GAS_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    })
    .then(() => {
      showStatus('✓ 保存しました（' + formatDuration(duration) + '）', 'success');
      resetUI();
    })
    .catch(err => {
      showStatus('送信エラー: ' + err.message, 'error');
      document.getElementById('btn-end').disabled = false;
    });
  }

  function resetUI() {
    startTime = null;
    selectedSong = null;
    const label = document.getElementById('song-select-label');
    label.textContent = '曲を選択してください';
    label.classList.add('placeholder');
    document.getElementById('song-select-trigger').classList.remove('disabled');
    document.getElementById('btn-start').disabled = false;
    document.getElementById('start-card').style.display = 'block';
    document.getElementById('practicing-area').style.display = 'none';
    document.getElementById('timer').textContent = '00:00';
  }

  function updateTimer() {
    if (!startTime) return;
    const elapsed = Math.floor((new Date() - startTime) / 1000);
    const mm = String(Math.floor(elapsed / 60)).padStart(2, '0');
    const ss = String(elapsed % 60).padStart(2, '0');
    document.getElementById('timer').textContent = mm + ':' + ss;
  }

  function formatDate(d) {
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return y + '-' + m + '-' + day;
  }

  function formatTime(d) {
    const h = String(d.getHours()).padStart(2, '0');
    const m = String(d.getMinutes()).padStart(2, '0');
    return h + ':' + m;
  }

  function showStatus(msg, type) {
    const el = document.getElementById('status');
    el.textContent = msg;
    el.className = type;
    el.style.display = 'block';
  }

  function hideStatus() {
    const el = document.getElementById('status');
    el.style.display = 'none';
    el.className = '';
  }

  // ========== 初期化 ==========
  loadSongs();

  // Enterキーで曲追加
  document.getElementById('new-song-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.isComposing) document.getElementById('new-artist-input').focus();
  });
  document.getElementById('new-artist-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.isComposing) addSong();
  });

  // ドロップダウン外タップで閉じる
  document.addEventListener('click', function(e) {
    const wrapper = document.getElementById('song-select-wrapper');
    if (wrapper && !wrapper.contains(e.target)) closeSongSelect();
  });
</script>

<!-- 保存確認モーダル -->
<div class="modal-overlay" id="save-modal-overlay">
  <div class="modal">
    <div class="modal-message">
      練習を記録しますか？<br>
      <span id="save-modal-song" style="font-weight:700;"></span><br>
      <span id="save-modal-duration" style="color:#888;font-size:14px;"></span>
    </div>
    <input type="text" id="memo-input" class="memo-input" placeholder="メモ（任意）">
    <div class="modal-buttons">
      <button class="modal-btn-cancel" onclick="closeSaveModal()">練習に戻る</button>
      <button class="modal-btn-save" onclick="confirmSave()">保存する</button>

  </div>
</div>
